name: Deploy to VPS (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: nitip-prod
    env:
      NODE_NO_WARNINGS: 1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Secrets File
        run: |
          cp ~/.secret/nitip-web-production.env .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (Yarn)
        run: |
          corepack enable

      - name: Install Dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Build Static Site
        run: |
          yarn generate

      - name: Stop and Cleanup Docker Web Container
        run: |
          docker compose down || true
          docker image rm nitip-web-app || true

      - name: Deploy Static Files to Nginx Path
        run: |
          rm -rf /var/www/nitip-web/*
          cp -r .output/public/* /var/www/nitip-web/
name: Deploy to VPS (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: nitip-prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Static Files via Docker
        run: |
          # Build image (hanya untuk generate static files)
          docker build -t nitip-web-builder .

          # Extract output dari container ke host
          # Container temporary → copy .output/public/ → hapus container
          docker create --name nitip-web-extract nitip-web-builder
          docker cp nitip-web-extract:/app/.output/public /tmp/nitip-web-build
          docker rm nitip-web-extract

      - name: Deploy to Nginx Directory
        run: |
          # Clear old files
          sudo rm -rf /var/www/web.nihtip.com/*

          # Copy new build
          sudo cp -r /tmp/nitip-web-build/* /var/www/web.nihtip.com/

          # Set proper permissions
          sudo chown -R www-data:www-data /var/www/web.nihtip.com/

          # Cleanup temp
          rm -rf /tmp/nitip-web-build

          # Reload nginx (no downtime)
          sudo nginx -t && sudo systemctl reload nginx

      - name: Cleanup Docker
        run: |
          docker image rm nitip-web-builder 2>/dev/null || true
          docker image prune -f

      - name: Verify Deployment
        run: |
          sleep 2
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://web.nihtip.com/ || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deployment successful - HTTP $HTTP_CODE"
          else
            echo "⚠️ Got HTTP $HTTP_CODE (check DNS/SSL if needed)"
          fi
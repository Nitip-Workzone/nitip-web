# ========================================
# Nginx reverse proxy for nitip-web (SSR Container)
# Taruh di /etc/nginx/sites-available/web.nihtip.com
# Symlink: ln -s /etc/nginx/sites-available/web.nihtip.com /etc/nginx/sites-enabled/
# ========================================

server {
    listen 80;
    server_name web.nihtip.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name web.nihtip.com;

    ssl_certificate /etc/letsencrypt/live/web.nihtip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web.nihtip.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Reverse proxy ke container nitip-web (port 3002)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
# ========================================
# Nginx config for nitip-web (CSR PWA)
# Taruh di /etc/nginx/sites-available/nitip-web
# Symlink: ln -s /etc/nginx/sites-available/nitip-web /etc/nginx/sites-enabled/
# ========================================

server {
    listen 80;
    server_name web.nihtip.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name web.nihtip.com;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/web.nihtip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web.nihtip.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/web.nihtip.com;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PWA service worker - no cache (agar update terdeteksi)
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback: semua route → index.html (critical untuk client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
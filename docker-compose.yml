services:
  app:
    networks:
      - nitip-net
    build: .
    container_name: nitip-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      NUXT_DEVTOOLS: "false"
    ports:
      - "127.0.0.1:3002:3000"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "logging_job=nitip-web"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  nitip-net:
    external: true
    name: nitip-core_nitip-net
